<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fev test artifact</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: linear-gradient(135deg, #6a5cff, #d14fff);
        color: #fff;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        padding: 40px 56px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      h1 { margin: 0 0 8px; font-size: 40px; }
      button {
        margin-top: 18px;
        font-size: 16px;
        padding: 10px 22px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #fff;
        color: #6a5cff;
        font-weight: 700;
      }
      #count { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>fev works 🎉</h1>
      <p>HTML preview, no build step.</p>
      <button onclick="document.getElementById('count').textContent = ++c">
        clicked <span id="count">0</span>×
      </button>
    </div>
    <script>
      let c = 0;
    </script>
  </body>
</html>
